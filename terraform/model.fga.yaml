name: Authorization Model Tests
model_file: model.fga
tuples:
  - user: "identity:admin-user-id"
    relation: admin
    object: "cluster:global"
  - user: "identity:org-owner-id"
    relation: owner
    object: "organization:org-1"
  - user: "identity:org-member-id"
    relation: member
    object: "organization:org-1"
  - user: "cluster:global"
    relation: cluster
    object: "organization:org-1"
  - user: "identity:app-installed-id"
    relation: thread_create
    object: "organization:org-1"
  - user: "identity:app-installed-id"
    relation: thread_write
    object: "organization:org-1"
  - user: "identity:app-installed-id"
    relation: participant_add
    object: "organization:org-1"
  - user: "organization:org-1"
    relation: org
    object: "thread:thread-1"
  - user: "identity:thread-participant-id"
    relation: participant
    object: "thread:thread-1"
  - user: "organization:org-1"
    relation: org
    object: "model:model-1"
tests:
  - name: cluster admin can admin cluster
    check:
      - user: "identity:admin-user-id"
        object: "cluster:global"
        assertions:
          admin: true
  - name: non-admin cannot admin cluster
    check:
      - user: "identity:org-owner-id"
        object: "cluster:global"
        assertions:
          admin: false
  - name: org owner inherits org permissions
    check:
      - user: "identity:org-owner-id"
        object: "organization:org-1"
        assertions:
          owner: true
          member: true
          can_invite: true
          can_manage_members: true
          can_view_threads: true
          can_create_thread: true
  - name: org member has limited org permissions
    check:
      - user: "identity:org-member-id"
        object: "organization:org-1"
        assertions:
          owner: false
          member: true
          can_invite: false
          can_manage_members: false
          can_view_threads: false
          can_create_thread: true
  - name: cluster admin can add org members
    check:
      - user: "identity:admin-user-id"
        object: "organization:org-1"
        assertions:
          can_add_member: true
  - name: non-admin cannot add org members
    check:
      - user: "identity:org-owner-id"
        object: "organization:org-1"
        assertions:
          can_add_member: false
  - name: installed app has org app permissions
    check:
      - user: "identity:app-installed-id"
        object: "organization:org-1"
        assertions:
          thread_create: true
          thread_write: true
          participant_add: true
          can_create_thread: true
  - name: uninstalled app lacks org app permissions
    check:
      - user: "identity:app-uninstalled-id"
        object: "organization:org-1"
        assertions:
          thread_create: false
          thread_write: false
          participant_add: false
          can_create_thread: false
  - name: thread participant can read write add
    check:
      - user: "identity:thread-participant-id"
        object: "thread:thread-1"
        assertions:
          can_read: true
          can_write: true
          can_add_participant: true
  - name: org owner can read thread
    check:
      - user: "identity:org-owner-id"
        object: "thread:thread-1"
        assertions:
          can_read: true
          can_write: false
          can_add_participant: false
  - name: installed app can write and add to thread
    check:
      - user: "identity:app-installed-id"
        object: "thread:thread-1"
        assertions:
          can_read: false
          can_write: true
          can_add_participant: true
  - name: model permissions derive from org roles
    check:
      - user: "identity:org-owner-id"
        object: "model:model-1"
        assertions:
          can_manage: true
          can_use: true
      - user: "identity:org-member-id"
        object: "model:model-1"
        assertions:
          can_manage: false
          can_use: true
      - user: "identity:app-installed-id"
        object: "model:model-1"
        assertions:
          can_manage: false
          can_use: false
