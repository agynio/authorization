version: v1

plugins:
  - plugin: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
      - Magynio/api/authorization/v1/authorization.proto=github.com/agynio/authorization/gen/go/agynio/api/authorization/v1
  - plugin: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
      - Magynio/api/authorization/v1/authorization.proto=github.com/agynio/authorization/gen/go/agynio/api/authorization/v1
